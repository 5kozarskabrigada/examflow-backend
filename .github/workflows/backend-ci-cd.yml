name: Backend CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore backend/ExamFlow.Api/ExamFlow.Api.csproj

      - name: Build
        run: dotnet build backend/ExamFlow.Api/ExamFlow.Api.csproj --no-restore --configuration Release

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    env:
      HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
      HETZNER_USER: ${{ secrets.HETZNER_USER }}
      HETZNER_SSH_PORT: ${{ secrets.HETZNER_SSH_PORT || '22' }}
      HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
      HETZNER_SSH_KEY_B64: ${{ secrets.HETZNER_SSH_KEY_B64 }}
      NEON_CONNECTION_STRING: ${{ secrets.NEON_CONNECTION_STRING }}
      FRONTEND_ORIGIN: ${{ secrets.FRONTEND_ORIGIN }}
      API_DOMAIN: ${{ secrets.API_DOMAIN }}

    steps:
      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh

          if [ -n "$HETZNER_SSH_KEY_B64" ]; then
            printf '%s' "$HETZNER_SSH_KEY_B64" | tr -d '\r\n ' | base64 --decode > ~/.ssh/id_ed25519
          else
            KEY_RAW="$HETZNER_SSH_KEY"
            KEY_RAW="${KEY_RAW%\"}"
            KEY_RAW="${KEY_RAW#\"}"

            if grep -q '\\n' <<< "$KEY_RAW"; then
              printf '%b' "$KEY_RAW" | tr -d '\r' > ~/.ssh/id_ed25519
            else
              printf '%s' "$KEY_RAW" | tr -d '\r' > ~/.ssh/id_ed25519
            fi
          fi

          sed -i -e '$a\' ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null 2>&1; then
            echo "::error::Invalid SSH private key. Set HETZNER_SSH_KEY_B64 to base64(private key) or HETZNER_SSH_KEY to exact BEGIN/END key text without extra quotes."
            exit 1
          fi

      - name: Add server to known_hosts
        shell: bash
        run: |
          HOST="$(printf '%s' "$HETZNER_HOST" | tr -d '\r\n ' )"
          PORT="$(printf '%s' "$HETZNER_SSH_PORT" | tr -d '\r\n ' )"

          if [ -z "$HOST" ] || [ -z "$PORT" ]; then
            echo "::error::HETZNER_HOST or HETZNER_SSH_PORT is empty."
            exit 1
          fi

          ssh-keyscan -p "$PORT" "$HOST" >> ~/.ssh/known_hosts

      - name: Verify SSH authentication
        shell: bash
        run: |
          HOST="$(printf '%s' "$HETZNER_HOST" | tr -d '\r\n ' )"
          USERNAME="$(printf '%s' "$HETZNER_USER" | tr -d '\r\n ' )"
          PORT="$(printf '%s' "$HETZNER_SSH_PORT" | tr -d '\r\n ' )"

          if [ -z "$HOST" ] || [ -z "$USERNAME" ] || [ -z "$PORT" ]; then
            echo "::error::HETZNER_HOST, HETZNER_USER, or HETZNER_SSH_PORT is empty."
            exit 1
          fi

          echo "Testing SSH auth to ${USERNAME}@${HOST}:${PORT}"
          ssh -o BatchMode=yes -o IdentitiesOnly=yes -i ~/.ssh/id_ed25519 -p "$PORT" "$USERNAME@$HOST" "echo SSH_AUTH_OK"

      - name: Deploy to Hetzner
        shell: bash
        run: |
          HOST="$(printf '%s' "$HETZNER_HOST" | tr -d '\r\n ' )"
          USERNAME="$(printf '%s' "$HETZNER_USER" | tr -d '\r\n ' )"
          PORT="$(printf '%s' "$HETZNER_SSH_PORT" | tr -d '\r\n ' )"
          API_DOMAIN_CLEAN="$(printf '%s' "$API_DOMAIN" | tr -d '\r\n ' )"

          if [ -z "$API_DOMAIN_CLEAN" ] || [[ "$API_DOMAIN_CLEAN" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            COMPOSE_FILE="docker-compose.nodomain.yml"
          else
            COMPOSE_FILE="docker-compose.hetzner.yml"
          fi

          ssh -o BatchMode=yes -o IdentitiesOnly=yes -i ~/.ssh/id_ed25519 -p "$PORT" "$USERNAME@$HOST" bash -s << SSHEOF
set -e
cd /opt/examflow-backend
git config --global --add safe.directory /opt/examflow-backend
git pull origin main

cat > .env << 'ENVVARS'
NEON_CONNECTION_STRING=${NEON_CONNECTION_STRING}
FRONTEND_ORIGIN=${FRONTEND_ORIGIN}
API_DOMAIN=${API_DOMAIN}
ENVVARS

OTHER_FILE="docker-compose.hetzner.yml"
if [ "${COMPOSE_FILE}" = "docker-compose.hetzner.yml" ]; then
  OTHER_FILE="docker-compose.nodomain.yml"
fi
docker compose -f ${COMPOSE_FILE} -f /dev/null down -f \$OTHER_FILE --remove-orphans 2>/dev/null || docker compose -f \$OTHER_FILE down --remove-orphans 2>/dev/null || true
docker compose -f ${COMPOSE_FILE} up -d --build --remove-orphans
docker image prune -f
SSHEOF
