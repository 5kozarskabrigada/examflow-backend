name: Backend CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore backend/ExamFlow.Api/ExamFlow.Api.csproj

      - name: Build
        run: dotnet build backend/ExamFlow.Api/ExamFlow.Api.csproj --no-restore --configuration Release

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: ${{ secrets.HETZNER_SSH_PORT || '22' }}
          script_stop: true
          script: |
            cd /opt/examflow-backend
            git pull origin main

            cat > .env <<EOF
            NEON_CONNECTION_STRING=${{ secrets.NEON_CONNECTION_STRING }}
            FRONTEND_ORIGIN=${{ secrets.FRONTEND_ORIGIN }}
            API_DOMAIN=${{ secrets.API_DOMAIN }}
            EOF

            docker compose -f docker-compose.hetzner.yml up -d --build
            docker image prune -f
