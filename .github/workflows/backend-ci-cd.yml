name: Backend CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore backend/ExamFlow.Api/ExamFlow.Api.csproj

      - name: Build
        run: dotnet build backend/ExamFlow.Api/ExamFlow.Api.csproj --no-restore --configuration Release

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    env:
      HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
      HETZNER_USER: ${{ secrets.HETZNER_USER }}
      HETZNER_SSH_PORT: ${{ secrets.HETZNER_SSH_PORT || '22' }}
      HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
      NEON_CONNECTION_STRING: ${{ secrets.NEON_CONNECTION_STRING }}
      FRONTEND_ORIGIN: ${{ secrets.FRONTEND_ORIGIN }}
      API_DOMAIN: ${{ secrets.API_DOMAIN }}

    steps:
      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          KEY_RAW="$HETZNER_SSH_KEY"
          KEY_RAW="${KEY_RAW%\"}"
          KEY_RAW="${KEY_RAW#\"}"

          if grep -q '\\n' <<< "$KEY_RAW"; then
            printf '%b' "$KEY_RAW" | tr -d '\r' > ~/.ssh/id_ed25519
          else
            printf '%s' "$KEY_RAW" | tr -d '\r' > ~/.ssh/id_ed25519
          fi

          sed -i -e '$a\' ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null 2>&1; then
            echo "::error::Invalid SSH private key in HETZNER_SSH_KEY. Save the exact private key text (BEGIN/END lines included), without extra quotes."
            exit 1
          fi

      - name: Add server to known_hosts
        shell: bash
        run: |
          ssh-keyscan -p "$HETZNER_SSH_PORT" "$HETZNER_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to Hetzner
        shell: bash
        run: |
          ssh -o BatchMode=yes -o IdentitiesOnly=yes -i ~/.ssh/id_ed25519 -p "$HETZNER_SSH_PORT" "$HETZNER_USER@$HETZNER_HOST" <<EOF
          set -e
          cd /opt/examflow-backend
          git pull origin main

          cat > .env <<ENVVARS
          NEON_CONNECTION_STRING=$NEON_CONNECTION_STRING
          FRONTEND_ORIGIN=$FRONTEND_ORIGIN
          API_DOMAIN=$API_DOMAIN
          ENVVARS

          docker compose -f docker-compose.nodomain.yml up -d --build
          docker image prune -f
          EOF
